services:
  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../config/.env
    volumes:
      - ../config:/app/config:ro
      - monitor_data:/app/data
    working_dir: /app
    environment:
      - MONITOR_DB_PATH=/app/data/signals.db

volumes:
  monitor_data:
